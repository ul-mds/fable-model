default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [ --markdown-linebreak-ext=md ]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff-check
      - id: ruff-format
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: pytest tests --cov=fable_model --cov-branch --cov-fail-under=90
        language: system
        always_run: true
        pass_filenames: false
        stages: [ pre-push ]
      - id: readme-coverage-badger
        name: readme-coverage-badger
        entry: readme-cov
        language: system
        always_run: true
        pass_filenames: false
        stages: [ pre-push ]
